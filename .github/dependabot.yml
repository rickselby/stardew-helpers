version: 2
updates:
  - package-ecosystem: bundler
    directory: /
    schedule:
      interval: "cron"
      cronjob: "every day at 8am"
      timezone: "Europe/London"
    groups:
      dev-dependencies:
        dependency-type: "development"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: "cron"
      cronjob: "every day at 8am"
      timezone: "Europe/London"
